name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Dependency installation mirrors release.yml with deliberate simplifications:
# - Single macOS runner (not universal binary)
# - Skip libfuse2 on Linux (only needed for AppImage packaging)
# If release.yml changes deps, update this file too.

jobs:
  lint:
    name: Code Style
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          tidy-checks: '-*'
          version: '18'
          files-changed-only: true
          ignore: 'vendor'
          thread-comments: true

      - name: Fail on format violations
        if: steps.linter.outputs.clang-format-checks-failed > 0
        run: exit 1

  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            test
            refactor
            build
            ci

  build-test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: linux
          target: desktop
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgl1-mesa-dev libssl-dev zlib1g-dev pkg-config

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-linux-x86_64
          path: build/Traktor

  build-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: mac
          target: desktop
          cache: true

      - name: Install dependencies
        run: brew install openssl pkg-config

      - name: Build
        run: |
          SSL_PREFIX="$(brew --prefix openssl)"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$SSL_PREFIX"
          cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Bundle app for testing
        if: github.event_name == 'pull_request'
        run: |
          macdeployqt build/Traktor.app

          # Strip frameworks and plugins Traktor does not use.
          # macdeployqt in Qt 6 bundles these via transitive plugin deps.
          # Traktor is a pure Widgets app with zero QML, SVG, GIF, or network use.
          rm -rf build/Traktor.app/Contents/Frameworks/QtQml*.framework \
                 build/Traktor.app/Contents/Frameworks/QtQuick*.framework \
                 build/Traktor.app/Contents/Frameworks/QtDBus.framework \
                 build/Traktor.app/Contents/Frameworks/QtSvg.framework
          rm -f build/Traktor.app/Contents/PlugIns/iconengines/libqsvgicon.dylib \
                build/Traktor.app/Contents/PlugIns/imageformats/libqgif.dylib \
                build/Traktor.app/Contents/PlugIns/imageformats/libqico.dylib \
                build/Traktor.app/Contents/PlugIns/tls/libqopensslbackend.dylib \
                build/Traktor.app/Contents/PlugIns/tls/libqsecuretransportbackend.dylib \
                build/Traktor.app/Contents/PlugIns/tls/libqcertonlybackend.dylib
          rm -rf build/Traktor.app/Contents/PlugIns/networkinformation \
                 build/Traktor.app/Contents/PlugIns/tls

          codesign --force --deep --sign - build/Traktor.app

      - name: Build PKG installer
        if: github.event_name == 'pull_request'
        run: |
          # Verify app bundle exists and has content
          echo "App bundle contents:"
          ls -la build/Traktor.app/Contents/MacOS/
          echo "App bundle size: $(du -sh build/Traktor.app | cut -f1)"

          # Build component package using --root with component plist.
          # The component plist disables bundle relocation (prevents installer
          # from finding an existing Traktor.app elsewhere and installing there).
          mkdir -p /tmp/pkg-root
          cp -R build/Traktor.app /tmp/pkg-root/

          pkgbuild --analyze --root /tmp/pkg-root /tmp/component.plist
          /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" /tmp/component.plist

          pkgbuild \
            --root /tmp/pkg-root \
            --component-plist /tmp/component.plist \
            --scripts scripts/macos-pkg \
            --identifier com.servmask.traktor \
            --version 0.0.0-dev \
            --install-location /Applications \
            --ownership recommended \
            traktor-component.pkg

          rm -rf /tmp/pkg-root

          # Verify component package payload
          echo "Component package size: $(du -sh traktor-component.pkg | cut -f1)"

          # Build product archive with custom welcome/conclusion text
          productbuild \
            --distribution scripts/macos-pkg/distribution.xml \
            --resources scripts/macos-pkg/resources \
            --package-path . \
            Traktor.pkg

          echo "Final PKG size: $(du -sh Traktor.pkg | cut -f1)"

          # Also keep the app tar for direct testing
          tar -cf Traktor.app.tar build/Traktor.app

      - name: Upload PKG artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-macOS-PKG
          path: Traktor.pkg

      - name: Upload app artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-macOS
          path: Traktor.app.tar

  build-test-windows:
    name: Build & Test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-msvc2022-openssl-zlib
          restore-keys: |
            vcpkg-windows-msvc2022-

      - name: Install OpenSSL and zlib
        run: vcpkg install openssl:x64-windows zlib:x64-windows

      - name: Build
        shell: cmd
        run: |
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake
          cmake --build build

      - name: Deploy test dependencies
        shell: cmd
        run: windeployqt build\tests\tst_qtraktor.exe

      - name: Run tests
        shell: cmd
        run: build\tests\tst_qtraktor.exe

      - name: Bundle app for testing
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: windeployqt build\Traktor.exe

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-windows-x64
          path: build\Traktor.exe

  pr-artifacts-comment:
    name: PR Build Artifacts
    if: github.event_name == 'pull_request'
    needs: [build-test-linux, build-test-macos, build-test-windows]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post artifact links to PR
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;
            const prNumber = context.payload.pull_request.number;
            const url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}`;

            const body = `## Build Artifacts

            | Platform | Download |
            |----------|----------|
            | Linux (x86_64) | [Traktor-linux-x86_64](${url}#artifacts) |
            | macOS (Apple Silicon) | [Traktor-macOS](${url}#artifacts) |
            | Windows (x64) | [Traktor-windows-x64](${url}#artifacts) |

            Built from ${context.sha.substring(0, 7)}. Artifacts expire after 90 days.`.replace(/            /g, '');

            // Find and update existing comment, or create new one
            const comments = await github.rest.issues.listComments({
              ...repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Build Artifacts')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: prNumber,
                body,
              });
            }
