name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  VERSION: ${{ github.event.release.tag_name || 'latest' }}

jobs:
  build-macos:
    # Qt 6.8 from install-qt-action ships universal (arm64+x86_64) frameworks.
    # We build on two runners to get native-arch OpenSSL from Homebrew, then
    # lipo-merge only the Traktor binary and OpenSSL dylibs. Qt frameworks
    # are already universal and copied as-is from the arm64 build.
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: mac
          target: desktop
          cache: true

      - name: Install dependencies
        run: brew install openssl pkg-config

      - name: Build
        run: |
          SSL_PREFIX="$(brew --prefix openssl)"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$SSL_PREFIX" \
            -DBUILD_TESTING=OFF
          cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Bundle Qt frameworks
        if: matrix.arch == 'arm64'
        run: |
          macdeployqt build/Traktor.app

          # Strip frameworks and plugins Traktor does not use.
          rm -rf build/Traktor.app/Contents/Frameworks/QtQml*.framework \
                 build/Traktor.app/Contents/Frameworks/QtQuick*.framework \
                 build/Traktor.app/Contents/Frameworks/QtSvg.framework
          rm -f build/Traktor.app/Contents/PlugIns/iconengines/libqsvgicon.dylib \
                build/Traktor.app/Contents/PlugIns/imageformats/libqgif.dylib \
                build/Traktor.app/Contents/PlugIns/imageformats/libqico.dylib \
                build/Traktor.app/Contents/PlugIns/tls/libqopensslbackend.dylib \
                build/Traktor.app/Contents/PlugIns/tls/libqsecuretransportbackend.dylib \
                build/Traktor.app/Contents/PlugIns/tls/libqcertonlybackend.dylib
          rm -rf build/Traktor.app/Contents/PlugIns/networkinformation \
                 build/Traktor.app/Contents/PlugIns/tls

      - name: Archive app (arm64 - full bundle with Qt frameworks)
        if: matrix.arch == 'arm64'
        run: tar -cf Traktor-arm64.app.tar -C build Traktor.app

      - name: Archive binary only (x86_64 - just the executable and OpenSSL)
        if: matrix.arch == 'x86_64'
        run: |
          # Only archive files that need lipo merge (Traktor binary + OpenSSL)
          mkdir -p x86_64-binaries
          cp build/Traktor.app/Contents/MacOS/Traktor x86_64-binaries/
          # Copy OpenSSL dylibs from Homebrew (native x86_64)
          SSL_PREFIX="$(brew --prefix openssl)"
          cp "$SSL_PREFIX/lib/libssl"*.dylib x86_64-binaries/ 2>/dev/null || true
          cp "$SSL_PREFIX/lib/libcrypto"*.dylib x86_64-binaries/ 2>/dev/null || true
          tar -cf Traktor-x86_64-binaries.tar -C x86_64-binaries .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-${{ matrix.arch }}.app
          path: Traktor-${{ matrix.arch }}*.tar

  package-macos:
    needs: build-macos
    runs-on: macos-latest
    steps:
      # Sparse checkout up-front: scripts/macos-pkg/ has entitlements.plist
      # (codesign step) and pkgbuild scripts/resources (PKG step);
      # scripts/sparkle/ has the appcast XML template (Sparkle artifact step).
      # Doing it once here removes the previous "rename before checkout"
      # + redundant second checkout pattern.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/macos-pkg
            scripts/sparkle
          sparse-checkout-cone-mode: false

      - name: Download arm64 app (full bundle)
        uses: actions/download-artifact@v4
        with:
          name: Traktor-arm64.app
          path: arm64

      - name: Download x86_64 binaries
        uses: actions/download-artifact@v4
        with:
          name: Traktor-x86_64.app
          path: x86_64

      - name: Extract archives
        run: |
          tar -xf arm64/Traktor-arm64.app.tar -C arm64
          mkdir -p x86_64-bin
          tar -xf x86_64/Traktor-x86_64-binaries.tar -C x86_64-bin

      - name: Create universal binary
        run: |
          # Start with the full arm64 app bundle (Qt frameworks are already universal)
          cp -R arm64/Traktor.app Universal-Traktor.app

          # Lipo-merge the Traktor binary (arm64 + x86_64)
          echo "Merging: Contents/MacOS/Traktor"
          lipo -create \
            arm64/Traktor.app/Contents/MacOS/Traktor \
            x86_64-bin/Traktor \
            -output Universal-Traktor.app/Contents/MacOS/Traktor

          # Lipo-merge OpenSSL dylibs
          for dylib in libssl.3.dylib libcrypto.3.dylib; do
            arm_file="arm64/Traktor.app/Contents/Frameworks/$dylib"
            intel_file="x86_64-bin/$dylib"
            if [ -f "$arm_file" ] && [ -f "$intel_file" ]; then
              echo "Merging: Contents/Frameworks/$dylib"
              lipo -create "$arm_file" "$intel_file" \
                -output "Universal-Traktor.app/Contents/Frameworks/$dylib"
            fi
          done

      - name: Import signing certs and notarization API key
        env:
          APP_P12_B64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          INSTALLER_P12_B64: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          APP_CERT="$RUNNER_TEMP/app.p12"
          INSTALLER_CERT="$RUNNER_TEMP/installer.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          API_KEY_PATH="$RUNNER_TEMP/asc_api_key.p8"

          echo -n "$APP_P12_B64" | base64 --decode -o "$APP_CERT"
          echo -n "$INSTALLER_P12_B64" | base64 --decode -o "$INSTALLER_CERT"
          echo -n "$ASC_API_KEY_P8" | base64 --decode -o "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$APP_CERT"       -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$INSTALLER_CERT" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          rm -f "$APP_CERT" "$INSTALLER_CERT"

      - name: Codesign universal app (Developer ID + hardened runtime)
        env:
          IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
        run: |
          # Sparkle.framework contains nested helper bundles (Updater.app,
          # Autoupdate executable, XPCServices/{Downloader,Installer}.xpc)
          # that ship pre-signed ad-hoc in the Sparkle release tarball.
          # Apple notarization requires every nested binary to be signed
          # by our Developer ID, so we re-sign them inside-out BEFORE the
          # generic framework loop below.
          SPARKLE_V="Universal-Traktor.app/Contents/Frameworks/Sparkle.framework/Versions/B"
          if [ -d "$SPARKLE_V" ]; then
            for xpc in "$SPARKLE_V"/XPCServices/*.xpc; do
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$xpc"
            done
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$SPARKLE_V/Updater.app"
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$SPARKLE_V/Autoupdate"
          fi

          # Inside-out: frameworks â†’ dylibs â†’ plugins â†’ main app
          find Universal-Traktor.app/Contents/Frameworks -name "*.framework" -type d | while IFS= read -r fw; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$fw"
          done
          find Universal-Traktor.app/Contents/Frameworks -name "*.dylib" -type f | while IFS= read -r lib; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$lib"
          done
          find Universal-Traktor.app/Contents/PlugIns -type f -name "*.dylib" 2>/dev/null | while IFS= read -r lib; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$lib"
          done

          # Sign the app bundle last, with entitlements applied to the OUTER
          # bundle only (not to nested frameworks per Apple guidance).
          # See scripts/macos-pkg/entitlements.plist for the rationale.
          codesign --force --options runtime --timestamp \
            --entitlements scripts/macos-pkg/entitlements.plist \
            --sign "$IDENTITY" Universal-Traktor.app

          codesign --verify --deep --strict --verbose=2 Universal-Traktor.app

      - name: Notarize and staple .app (Sparkle-ready)
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          # notarytool doesn't accept .app directly - wrap in a zip first
          ditto -c -k --keepParent Universal-Traktor.app "$RUNNER_TEMP/Traktor.zip"

          xcrun notarytool submit "$RUNNER_TEMP/Traktor.zip" \
            --key "$RUNNER_TEMP/asc_api_key.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait --timeout 30m

          # Staple goes onto the .app itself, not the zip; the zip was just transport
          xcrun stapler staple Universal-Traktor.app
          xcrun stapler validate Universal-Traktor.app

          rm -f "$RUNNER_TEMP/Traktor.zip"

      - name: Build Sparkle update artifact and signed appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          # Pin the Sparkle version to match CMakeLists.txt's FetchContent.
          # Both versions must be kept in sync - the framework bundled into
          # the .app and the sign_update tool used to sign the update zip
          # should come from the same Sparkle release.
          SPARKLE_VERSION=2.9.1
          curl -sL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle-tools"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle-tools"
          SIGN_UPDATE="$RUNNER_TEMP/sparkle-tools/bin/sign_update"

          # Zip the (already-stapled) .app for Sparkle delivery.
          # Sparkle's recommended form: --sequesterRsrc preserves resource
          # forks (different from the notarization zip which uses
          # --keepParent only).
          ditto -c -k --sequesterRsrc --keepParent Universal-Traktor.app Traktor.app.zip

          # Write the EdDSA private key to a temp file. The GitHub Secret
          # value is already the 44-char base64 string in Sparkle's
          # deployable format - paste-as-is, no decode step.
          KEY_FILE="$RUNNER_TEMP/sparkle_private.key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          SPARKLE_SIG_LINE=$("$SIGN_UPDATE" -f "$KEY_FILE" Traktor.app.zip)
          rm -f "$KEY_FILE"

          # Render appcast-macos.xml from the template.
          # VERSION_TAG keeps the leading "v" (e.g. v1.10.0) for URLs;
          # VERSION_NUM strips it (e.g. 1.10.0) so sparkle:version matches
          # CFBundleVersion/CFBundleShortVersionString in Info.plist.
          # Python's os.path.expandvars is used instead of envsubst because
          # gettext is not reliably on PATH on macOS runners (Homebrew's
          # gettext is keg-only); python3 always is.
          export VERSION_TAG="${{ env.VERSION }}"
          export VERSION_NUM="${VERSION_TAG#v}"
          export PUB_DATE="$(date -u +'%a, %d %b %Y %H:%M:%S +0000')"
          export DOWNLOAD_URL="https://github.com/servmask/Qtraktor/releases/download/${VERSION_TAG}/Traktor.app.zip"
          export SPARKLE_SIG_LINE
          python3 -c 'import os, sys; sys.stdout.write(os.path.expandvars(sys.stdin.read()))' \
            < scripts/sparkle/appcast-macos.xml.tmpl > appcast-macos.xml

          echo "--- appcast-macos.xml ---"
          cat appcast-macos.xml

      - name: Upload Sparkle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-Sparkle-${{ env.VERSION }}
          path: |
            Traktor.app.zip
            appcast-macos.xml

      - name: Build PKG installer
        env:
          INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}
        run: |
          mv Universal-Traktor.app Traktor.app

          # Generate component plist and disable bundle relocation
          mkdir -p /tmp/pkg-root
          cp -R Traktor.app /tmp/pkg-root/
          pkgbuild --analyze --root /tmp/pkg-root /tmp/component.plist
          /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" /tmp/component.plist

          pkgbuild \
            --root /tmp/pkg-root \
            --component-plist /tmp/component.plist \
            --scripts scripts/macos-pkg \
            --identifier com.servmask.traktor \
            --version "${{ env.VERSION }}" \
            --install-location /Applications \
            --ownership recommended \
            traktor-component.pkg

          rm -rf /tmp/pkg-root

          productbuild \
            --distribution scripts/macos-pkg/distribution.xml \
            --resources scripts/macos-pkg/resources \
            --package-path . \
            --sign "$INSTALLER_IDENTITY" \
            "Traktor-${{ env.VERSION }}.pkg"

      - name: Notarize and staple PKG
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          xcrun notarytool submit "Traktor-${{ env.VERSION }}.pkg" \
            --key "$RUNNER_TEMP/asc_api_key.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait --timeout 30m

          xcrun stapler staple "Traktor-${{ env.VERSION }}.pkg"
          xcrun stapler validate "Traktor-${{ env.VERSION }}.pkg"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-${{ env.VERSION }}.pkg
          path: Traktor-${{ env.VERSION }}.pkg

      - name: Delete temp keychain and notarization key
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -f "$RUNNER_TEMP/asc_api_key.p8"

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-msvc2022-openssl-zlib
          restore-keys: |
            vcpkg-windows-msvc2022-

      - name: Install OpenSSL and zlib
        run: vcpkg install openssl:x64-windows zlib:x64-windows

      - name: Build
        shell: cmd
        run: |
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake -DBUILD_TESTING=OFF
          cmake --build build

      - name: Stage Windows runtime
        shell: pwsh
        run: |
          # Bundle Qt runtime DLLs
          windeployqt build\Traktor.exe

          # Bundle the OpenSSL + zlib runtime DLLs from vcpkg. Names follow
          # upstream OUTPUT_NAME conventions, not the package name:
          #   libssl-3-x64.dll, libcrypto-3-x64.dll  (OpenSSL)
          #   z.dll                                  (zlib - OUTPUT_NAME "z")
          # Glob the version suffixes so port revisions don't break the bundle.
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          Write-Host "vcpkg bin contents:"
          Get-ChildItem $vcpkgBin | Format-Table Name,Length
          foreach ($pattern in @("libssl-*.dll", "libcrypto-*.dll", "z*.dll")) {
              $hits = Get-ChildItem $vcpkgBin -Filter $pattern
              if (-not $hits) { throw "No DLL matched '$pattern' in $vcpkgBin" }
              $hits | Copy-Item -Destination build\
          }

          # Smoke test: run the bundled exe. If any DLL is missing, the OS
          # surfaces a non-zero exit and we fail here instead of shipping a
          # broken installer. The CMake POST_BUILD step already deposited
          # WinSparkle.dll next to Traktor.exe in build\, so its import
          # resolves at process load.
          & build\Traktor.exe --version
          if ($LASTEXITCODE -ne 0) { throw "Bundled Traktor.exe failed smoke test (exit $LASTEXITCODE)" }

          # Bundle file type icon for .wpress association. Inno's
          # [Files] block copies everything from build\, so file.ico has
          # to be staged here.
          Copy-Item "icons\file.ico" -Destination build\

          # Bundle WinSparkle's MIT license alongside the runtime so the
          # installed payload reproduces the upstream copyright/license
          # notice as required by the MIT terms. FetchContent extracted
          # the release zip under build\_deps\winsparkle-src\; the file
          # is plain ASCII with no extension upstream, so we add a .txt
          # suffix for end-user friendliness on Windows.
          Copy-Item "build\_deps\winsparkle-src\COPYING" -Destination "build\WinSparkle-LICENSE.txt"

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          # windows-2022 ships Chocolatey but not Inno Setup. The
          # 'innosetup' package installs ISCC.exe to
          # C:\Program Files (x86)\Inno Setup 6\. We invoke ISCC by
          # absolute path below to avoid PATH-refresh quirks in pwsh.
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }

          # env.VERSION is "vX.Y.Z" for real release tags and "latest"
          # for workflow_dispatch test runs.
          #
          # Three derived values:
          #   $appVersion         "vX.Y.Z" / "latest" - keeps the leading v
          #                       for the output filename and the download
          #                       URL written into the appcast, matching
          #                       the GitHub release asset naming.
          #   $appVersionDisplay  "X.Y.Z" / "latest" - the leading v
          #                       is stripped for the user-facing strings
          #                       Inno renders (Programs and Features,
          #                       wizard headers, etc.) so they stay
          #                       consistent with the bare version the
          #                       app itself reports via PROJECT_VERSION
          #                       and the appcast's <sparkle:version>.
          #   $versionInfo        "X.Y.Z.W" - strict numeric required by
          #                       Inno's VersionInfoVersion; falls back
          #                       to 0.0.0.0 when env.VERSION is not
          #                       semver (e.g. "latest").
          $appVersion = $env:VERSION
          $appVersionDisplay = $appVersion -replace '^v', ''
          if ($appVersion -match '^v?(\d+)\.(\d+)\.(\d+)') {
              $versionInfo = "$($Matches[1]).$($Matches[2]).$($Matches[3]).0"
          } else {
              $versionInfo = "0.0.0.0"
          }

          # /DAppVersion + /DVersionInfoVersion feed {#AppVersion} and
          # {#VersionInfoVersion} inside installer.iss. /DSourceDir is
          # the absolute path to the staged build\ directory whose
          # contents become {app}. /O. writes the .exe to the working
          # directory; /F sets the output base filename so the final
          # artifact is Traktor-<tag>.exe and the subsequent WinSparkle
          # sign step finds it.
          # /F<name> takes the filename joined with no inner quotes;
          # PowerShell's native-command argument passing forwarded the
          # embedded `" earlier as literal " characters to ISCC, which
          # then rejected the OutputBaseFilename value as containing
          # invalid filename chars (verified live, run 25738401146).
          & $iscc `
            "/DAppVersion=$appVersionDisplay" `
            "/DVersionInfoVersion=$versionInfo" `
            "/DSourceDir=$PWD\build" `
            "/O." `
            "/FTraktor-$appVersion" `
            scripts\windows\installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path "Traktor-$appVersion.exe")) {
              throw "Expected Traktor-$appVersion.exe not found in $PWD"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-${{ env.VERSION }}.exe
          path: Traktor-${{ env.VERSION }}.exe

      - name: Build WinSparkle update artifact and signed appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          # Pin the WinSparkle version to match CMakeLists.txt's FetchContent.
          # Both must come from the same release: the DLL bundled into the
          # installer and winsparkle-tool.exe used to sign the .exe payload.
          WINSPARKLE_VERSION=0.9.2
          curl -sL \
            "https://github.com/vslavik/winsparkle/releases/download/v${WINSPARKLE_VERSION}/WinSparkle-${WINSPARKLE_VERSION}.zip" \
            -o "$RUNNER_TEMP/winsparkle.zip"
          unzip -q "$RUNNER_TEMP/winsparkle.zip" -d "$RUNNER_TEMP/winsparkle"
          SIGN_TOOL="$RUNNER_TEMP/winsparkle/WinSparkle-${WINSPARKLE_VERSION}/bin/winsparkle-tool.exe"

          # The GitHub Secret stores the same Ed25519 private key used by
          # macOS Sparkle. WinSparkle's tools/winsparkle-tool.cpp accepts
          # both the 32-byte seed format Sparkle 2 produces and the older
          # 96-byte concatenated format, so this works against the existing
          # secret with no conversion.
          KEY_FILE="$RUNNER_TEMP/sparkle_private.key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          # -v is required: default output is the bare base64 signature,
          # while verbose adds the appcast-ready line
          # 'sparkle:edSignature="..." length="..."' that the template
          # substitutes wholesale into the <enclosure> element.
          SPARKLE_SIG_LINE=$("$SIGN_TOOL" sign -v -f "$KEY_FILE" "Traktor-${{ env.VERSION }}.exe")
          rm -f "$KEY_FILE"

          # Render appcast-windows.xml from the template via sed. Python's
          # os.path.expandvars(${VAR}) does not substitute on Windows
          # runners (verified live: env vars are exported, but ntpath's
          # expandvars leaves ${name} placeholders untouched). sed is
          # both simpler and dependency-free here. Pipe delimiters
          # avoid the / in URLs; none of our values contain | or &.
          VERSION_TAG="${{ env.VERSION }}"
          VERSION_NUM="${VERSION_TAG#v}"
          PUB_DATE="$(date -u +'%a, %d %b %Y %H:%M:%S +0000')"
          DOWNLOAD_URL="https://github.com/servmask/Qtraktor/releases/download/${VERSION_TAG}/Traktor-${VERSION_TAG}.exe"
          sed -e "s|\${VERSION_TAG}|$VERSION_TAG|g" \
              -e "s|\${VERSION_NUM}|$VERSION_NUM|g" \
              -e "s|\${PUB_DATE}|$PUB_DATE|g" \
              -e "s|\${DOWNLOAD_URL}|$DOWNLOAD_URL|g" \
              -e "s|\${SPARKLE_SIG_LINE}|$SPARKLE_SIG_LINE|g" \
              scripts/sparkle/appcast-windows.xml.tmpl > appcast-windows.xml

          echo "--- appcast-windows.xml ---"
          cat appcast-windows.xml

      - name: Upload Sparkle artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-Sparkle-Windows-${{ env.VERSION }}
          path: appcast-windows.xml

  build-linux:
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: linux
          target: desktop
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgl1-mesa-dev libssl-dev zlib1g-dev pkg-config libfuse2

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build -j"$(nproc)"

      - name: Cache linuxdeploy
        uses: actions/cache@v4
        with:
          path: linuxdeploy*.AppImage
          key: linuxdeploy-continuous

      - name: Create AppImage
        run: |
          # Install linuxdeploy and Qt plugin (skipped if cached)
          [ -f linuxdeploy-x86_64.AppImage ] || wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          [ -f linuxdeploy-plugin-qt-x86_64.AppImage ] || wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Create .desktop file with file association and context menu action
          cat > traktor.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Traktor
          Comment=WPRESS Extractor
          Exec=Traktor %f
          Icon=traktor
          Type=Application
          Categories=Utility;
          MimeType=application/x-wpress;
          Actions=Extract;

          [Desktop Action Extract]
          Name=Extract with Traktor
          Exec=Traktor %f
          DESKTOP
          sed -i 's/^          //' traktor.desktop

          # Install MIME type definition
          mkdir -p AppDir/usr/share/mime/packages
          cp wpress.xml AppDir/usr/share/mime/packages/

          # Build AppImage. Pass the GUI plugin (libtraktor-gui.so) as
          # --library so linuxdeploy-plugin-qt scans it for Qt deps and
          # bundles Qt6Gui/Widgets/Network. The main executable links
          # only Qt6::Core + libdl on Linux (CLI works without libGL).
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/Traktor \
            --library build/libtraktor-core.so \
            --library build/libtraktor-gui.so \
            --desktop-file traktor.desktop \
            --icon-file icons/traktor.png \
            --plugin qt \
            --output appimage

          mv Traktor-*.AppImage Traktor-x86_64-${{ env.VERSION }}.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Traktor-x86_64-${{ env.VERSION }}.AppImage
          path: Traktor-x86_64-${{ env.VERSION }}.AppImage

  upload:
    if: github.event_name == 'release'
    needs: [package-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Check for VirusTotal API key
        env:
          VT_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          if [ -n "$VT_KEY" ]; then
            echo "HAS_VT_KEY=true" >> "$GITHUB_ENV"
          fi

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            Traktor-${{ env.VERSION }}.pkg/Traktor-${{ env.VERSION }}.pkg \
            Traktor-${{ env.VERSION }}.exe/Traktor-${{ env.VERSION }}.exe \
            Traktor-x86_64-${{ env.VERSION }}.AppImage/Traktor-x86_64-${{ env.VERSION }}.AppImage \
            Traktor-Sparkle-${{ env.VERSION }}/Traktor.app.zip \
            Traktor-Sparkle-${{ env.VERSION }}/appcast-macos.xml \
            Traktor-Sparkle-Windows-${{ env.VERSION }}/appcast-windows.xml \
            --repo "${{ github.repository }}"

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
        run: |
          VERSION="${{ env.VERSION }}"
          # Strip leading 'v' if present
          CLEAN_VERSION="${VERSION#v}"
          PKG_FILE="Traktor-${VERSION}.pkg/Traktor-${VERSION}.pkg"

          if [ ! -f "$PKG_FILE" ]; then
            echo "::warning::PKG not found at $PKG_FILE, skipping Homebrew update"
            exit 0
          fi

          SHA256=$(shasum -a 256 "$PKG_FILE" | awk '{print $1}')
          echo "PKG SHA256: $SHA256"

          # Clone the tap repo, update the cask, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/servmask/homebrew-traktor.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          python3 -c "
          import sys
          v = sys.argv[1]
          s = sys.argv[2]
          print('''cask \"traktor\" do
            version \"%s\"
            sha256 \"%s\"

            url \"https://github.com/servmask/Qtraktor/releases/download/v#{version}/Traktor-v#{version}.pkg\"
            name \"Traktor\"
            desc \"Extract WordPress .wpress backup files with CLI and MCP server\"
            homepage \"https://github.com/servmask/Qtraktor\"

            pkg \"Traktor-v#{version}.pkg\"

            caveats <<~EOS
              To register Traktor with your AI coding agents (Claude Code, Gemini CLI):
                traktor mcp register

              To check which agents are detected:
                traktor mcp status

              To uninstall completely:
                traktor uninstall
                brew uninstall traktor
            EOS

            uninstall pkgutil: \"com.servmask.traktor\",
                      delete:  [
                        \"/Applications/Traktor.app\",
                        \"/usr/local/bin/traktor\",
                      ]

            zap trash: [
              \"~/Library/Preferences/com.servmask.Traktor.plist\",
            ]
          end''' % (v, s))
          " "$CLEAN_VERSION" "$SHA256" | sed 's/^            //' > Casks/traktor.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/traktor.rb
          git diff --cached --quiet && echo "No changes to Homebrew Cask" && exit 0
          git commit -m "chore: update Traktor to v${CLEAN_VERSION}

          SHA256: ${SHA256}
          Release: https://github.com/servmask/Qtraktor/releases/tag/${VERSION}"
          git push

      - name: Submit to VirusTotal
        if: ${{ env.HAS_VT_KEY == 'true' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          submit_to_vt() {
            local file="$1"
            local name="$2"
            echo "Submitting $name to VirusTotal..."

            # Get upload URL (required for files that may exceed 32MB)
            upload_url=$(curl -s --request GET \
              --url "https://www.virustotal.com/api/v3/files/upload_url" \
              --header "x-apikey: $VT_API_KEY" | jq -r '.data')

            # Upload file
            response=$(curl -s --request POST \
              --url "$upload_url" \
              --header "x-apikey: $VT_API_KEY" \
              --form "file=@$file")

            analysis_id=$(echo "$response" | jq -r '.data.id // empty')
            if [ -z "$analysis_id" ]; then
              echo "::warning::Failed to submit $name to VirusTotal"
              echo "VT_${name}_LINK=" >> "$GITHUB_ENV"
              return
            fi

            # Wait for analysis to complete (poll up to 5 minutes)
            for i in $(seq 1 30); do
              sleep 10
              status=$(curl -s --request GET \
                --url "https://www.virustotal.com/api/v3/analyses/$analysis_id" \
                --header "x-apikey: $VT_API_KEY" | jq -r '.data.attributes.status')
              echo "  $name: $status (attempt $i/30)"
              if [ "$status" = "completed" ]; then
                break
              fi
            done

            # Get the SHA-256 from the analysis to build the permalink
            sha256=$(curl -s --request GET \
              --url "https://www.virustotal.com/api/v3/analyses/$analysis_id" \
              --header "x-apikey: $VT_API_KEY" | jq -r '.meta.file_info.sha256 // empty')

            if [ -n "$sha256" ]; then
              echo "VT_${name}=https://www.virustotal.com/gui/file/$sha256" >> "$GITHUB_ENV"
              echo "  $name: https://www.virustotal.com/gui/file/$sha256"
            else
              echo "VT_${name}=" >> "$GITHUB_ENV"
              echo "::warning::Could not get SHA-256 for $name"
            fi

            # Rate limit: free tier allows 4 req/min, wait between files
            sleep 15
          }

          submit_to_vt "Traktor-${{ env.VERSION }}.pkg/Traktor-${{ env.VERSION }}.pkg" "PKG"
          submit_to_vt "Traktor-${{ env.VERSION }}.exe/Traktor-${{ env.VERSION }}.exe" "EXE"
          submit_to_vt "Traktor-x86_64-${{ env.VERSION }}.AppImage/Traktor-x86_64-${{ env.VERSION }}.AppImage" "APPIMAGE"

      - name: Update release notes with VirusTotal links
        if: ${{ env.HAS_VT_KEY == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build VT section only with successful scans
          VT_SECTION=""
          [ -n "$VT_PKG" ] && VT_SECTION="${VT_SECTION}| macOS (.pkg) | [View scan results]($VT_PKG) |"$'\n'
          [ -n "$VT_EXE" ] && VT_SECTION="${VT_SECTION}| Windows (.exe) | [View scan results]($VT_EXE) |"$'\n'
          [ -n "$VT_APPIMAGE" ] && VT_SECTION="${VT_SECTION}| Linux (.AppImage) | [View scan results]($VT_APPIMAGE) |"$'\n'

          if [ -n "$VT_SECTION" ]; then
            EXISTING=$(gh release view "${{ github.event.release.tag_name }}" --json body -q .body --repo "${{ github.repository }}")
            APPEND=$(printf '\n\n---\n\n### VirusTotal Scan Results\n\n| File | Report |\n|------|--------|\n%s' "$VT_SECTION")
            gh release edit "${{ github.event.release.tag_name }}" \
              --notes "${EXISTING}${APPEND}" \
              --repo "${{ github.repository }}"
          fi
