name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use a PAT instead of GITHUB_TOKEN so that the 'release: published'
          # event triggers the Release workflow. GitHub's default token
          # intentionally does not trigger downstream workflows to prevent loops.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
